<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICU Pro - Nutrition Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .sidebar-item { @apply flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-all cursor-pointer; }
        .active-nav { @apply bg-blue-600 text-white; }
        .card { @apply bg-white rounded-xl shadow-sm border border-gray-200 p-6; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-50 bg-white flex items-center justify-center hidden">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">NICU Nutrition Pro</h1>
            <button onclick="login()" class="bg-white border border-gray-300 px-6 py-3 rounded-lg shadow hover:bg-gray-50 flex items-center gap-3">
                <img src="https://www.google.com/favicon.ico" class="w-5" alt="Google"> Sign in with Google
            </button>
        </div>
    </div>

    <aside id="sidebar" class="w-64 bg-gray-900 text-white flex flex-col p-4 fixed h-full">
        <div class="mb-8 px-4">
            <h2 class="text-xl font-bold text-blue-400">NICU Dashboard</h2>
            <p id="user-dept" class="text-xs text-gray-500 uppercase tracking-widest mt-1">General Dept</p>
        </div>
        <nav class="flex-1 space-y-2">
            <div onclick="showPage('home')" class="sidebar-item active-nav" id="nav-home">Home</div>
            <div onclick="showPage('patients')" class="sidebar-item" id="nav-patients">Patients</div>
            <div onclick="showPage('ref')" class="sidebar-item" id="nav-ref">Reference</div>
            <div onclick="showPage('profile')" class="sidebar-item" id="nav-profile">Profile</div>
        </nav>
        <button onclick="logout()" class="mt-auto sidebar-item text-red-400 hover:bg-red-900/20">Sign Out</button>
    </aside>

    <main class="flex-1 ml-64 p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 id="page-title" class="text-2xl font-bold text-gray-800">Home</h1>
            <div id="user-info" class="text-sm font-semibold text-gray-600"></div>
        </header>

        <section id="page-home" class="page-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card">
                    <h3 class="font-bold text-gray-500">Total Patients</h3>
                    <p id="stat-patients" class="text-3xl font-bold mt-2">0</p>
                </div>
            </div>
        </section>

        <section id="page-patients" class="page-content hidden">
            <div class="flex justify-between mb-4">
                <input type="text" id="patient-search" placeholder="Search by name..." class="px-4 py-2 border rounded-lg w-1/3">
                <button onclick="openAddPatientModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Add Patient</button>
            </div>
            <div class="card overflow-hidden !p-0">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                        <tr>
                            <th class="p-4">Name</th><th class="p-4">Gender</th><th class="p-4">Phone</th><th class="p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="patient-list-body"></tbody>
                </table>
            </div>
        </section>

        <section id="page-encounter" class="page-content hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showPage('patients')" class="text-blue-600 font-bold">&larr; Back to Patient</button>
                <div class="flex gap-2">
                    <span id="draft-badge" class="bg-amber-100 text-amber-700 px-3 py-1 rounded text-xs font-bold">DRAFT</span>
                    <button onclick="saveEncounter()" class="bg-green-600 text-white px-6 py-1 rounded-lg font-bold">SAVE ENCOUNTER</button>
                </div>
            </div>
            <div id="calculator-container" class="card">
                </div>
        </section>
    </main>

    <div id="toast"></div>
</body>
</html>
